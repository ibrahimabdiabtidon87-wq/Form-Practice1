<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Html Form Basics</title>
    <style>
        body{
            background-color: purple;
        }
        fieldset{
            color: white;
        }
    

    </style>
</head>
<body>
    <form action="" method="">
        <fieldset>
            <legend>Student Registration</legend>
            <p>
                <label for="Full Name">FullName</label><br>
                <input type="text" placeholder="Enter Your FullName" id="FullName">
            </p>
            <p>
                <label for="Email">Email</label><br>
                <input type="email" placeholder="Enter Your Email" id="Email">
            </p>
            <p>
                <label for="Choose Your Gender">Choose Your Gender</label><br>
                <input type="radio" placeholder="Male" id="Male">
                <label for="Male">Male</label>
                <input type="radio" placeholder="Female" id="Female">
                <label for="Female">Female</label>
                <input type="radio" placeholder="Other" id="Other">
                <label for="Other">Other</label>
            </p>
            <p>
                <label for="Skills">Skills:</label><br>
                <input type="checkbox" placeholder="Html" id="Html">
                <label for="HTML">HTML</label>
                <input type="checkbox">
                <label for="CSS">CSS</label>
                <input type="checkbox">
                <label for="JavaScript">JavaScript</label>
            </p>
            <p>
                <label for="Date of Birth">Date of Birth:</label><br>
                <input type="date" placeholder="">
            </p>
            <p>
                <label for="Country">Country:</label><br>
                <select name="Country" id="Country">
                    <option value="Somaalia">Somaalia</option>
                    <option value="Kenya">Kenya</option>
                    <option value="ethiopia">ethiopia</option>
                    <option value="Djibouti">Djibouti</option>
                </select>
            </p>
            <p>
                <label for="Address">Address:</label><br>
                <textarea name="Address" id="Address" rows="4" cols="30"></textarea>
            </p>
            <p>
                <input type="submit" value="Save" name="submit">
                <input type="reset" value="Clear Form Controls" name="reset">

            </p>





        </fieldset>
    </form>
    
</body>
</html>
